name: bharatresilio
version: 1.0
description: Chaos-driven logistics RL environment

observation_space:
  pending_orders: int
  available_riders: int
  failures: list
  system_health: float
  latency: int

action_space:
  - ASSIGN_RIDER
  - ADD_RIDER
  - RETRY_API
  - SCALE_SYSTEM
  - PRIORITIZE_ORDERS
  - DIAGNOSE_SYSTEM
  - WAIT

tasks:
  - sprinter
  - flaky_network
  - bharat_storm

reward_range: [-5.0, 10.0]